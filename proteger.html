<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Évaluation SST - Protéger</title>
    <style>
        /* Police et couleurs INRS */
        body {
            font-family: "Arial Narrow", Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #FFFFFF;
            color: #000000;
            text-align: center;
        }
        
        h1 {
            color:#019E53;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        h2 {
            color: #019E53;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .container {
            background-color: #FFFFFF;
            border: 1px solid #019E53;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        #participants-input {
            width: 100%;
            height: 100px;
            margin-bottom: 15px;
            padding: 3px;
            border: 1px solid #F4912D;
            border-radius: 4px;
            font-size: 16px;
            font-family: "Arial Narrow", Arial, sans-serif;
        }
        
        button {
            background-color: #F4912D;
            color: #FFFFFF;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-family: "Arial Narrow", Arial, sans-serif;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #e07a1f;
        }
        
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        #draw-button {
            background-color: #019E53;
            font-size: 18px;
            padding: 15px 30px;
        }
        
        #draw-button:hover {
            background-color: #017a40;
        }
        
        #result-container {
            display: none;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #F4912D;
            padding: 20px;
            border-radius: 5px;
        }
        
        #image-display {
            max-width: 100%;
            max-height: 400px;
            border: 1px solid #F4912D;
            border-radius: 5px;
            margin: 20px auto;
            display: block;
        }
        
        #description {
            font-size: 18px;
            margin: 20px 0;
            color: #000000;
            line-height: 1.5;
            text-align: left;
        }
        
        #stagiaire {
            font-size: 20px;
            font-weight: bold;
            color: #F4912D;
            margin: 20px 0;
        }
        
        .question {
            font-size: 18px;
            font-weight: bold;
            margin: 25px 0 15px 0;
            color: #000000;
            text-align: left;
        }
        
        .danger-options {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .danger-option {
            background-color: #FFFFFF;
            color: #000000;
            padding: 10px 15px;
            border: 1px solid #F4912D;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: "Arial Narrow", Arial, sans-serif;
        }
        
        .danger-option:hover {
            background-color: #019E53;
            color: #FFFFFF;
        }
        
        .danger-option.selected {
            background-color: #019E53;
            color: #FFFFFF;
            border-color: #019E53;
        }
        
        #sur-accident-question {
            margin-top: 30px;
            padding: 15px;
            background-color: #FFF;
            border: 1px solid #F4912D;
            border-radius: 5px;
            text-align: left;
        }
        
        #error-message {
            color: #F4912D;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Évaluation SST - Protéger</h1>

    <!-- Étape 1 : Saisie des participants -->
    <div id="participants-section" class="container">
        <h2>Saisir les prénoms des stagiaires (max 10)</h2>
        <p>Séparez les prénoms par des virgules ou un retour à la ligne :</p>
        <textarea id="participants-input" placeholder="Ex: Jean, Marie, Pierre..."></textarea>
        <div id="error-message"></div>
        <button onclick="validerParticipants()">Valider la liste</button>
    </div>

    <!-- Étape 2 : Tirage au sort -->
    <div id="draw-section" class="container hidden">
        <button id="draw-button" onclick="tirerAuSort()">Tirer au sort</button>
        
        <!-- Résultat du tirage -->
        <div id="result-container">
            <div id="stagiaire"></div>
            <img id="image-display" src="" alt="Image de la situation">
            <p id="description"></p>
            
            <div class="question">
                De quel type de danger s’agit-il ?
            </div>
            <div class="danger-options" id="danger-options">
                <div class="danger-option" onclick="selectDangerType(this, 'mécanique')">Mécanique</div>
                <div class="danger-option" onclick="selectDangerType(this, 'thermique')">Thermique</div>
                <div class="danger-option" onclick="selectDangerType(this, 'atmosphérique')">Atmosphérique</div>
                <div class="danger-option" onclick="selectDangerType(this, 'électrique')">Électrique</div>
            </div>
            
            <div class="question" id="sur-accident-question">
                Qu’allez-vous faire pour éviter un sur-accident ?
            </div>
            
            <button onclick="recommencer()" style="background-color: #F4912D;">Recommencer</button>
        </div>
    </div>

    <script>
        // Variables globales
        let participants = [];
        let evaluationData = {};
        let currentImage = null;
        let currentStagiaire = null;
        let usedCombinations = []; // Pour éviter les répétitions

        // Charger le fichier JSON
        async function chargerEvaluationData() {
            try {
                const response = await fetch('evaluation_PROTEGER.json');
                if (!response.ok) {
                    throw new Error("Fichier JSON introuvable. Vérifiez que 'evaluation_PROTEGER.json' est dans le même dossier.");
                }
                evaluationData = await response.json();
            } catch (error) {
                alert("Erreur lors du chargement du fichier JSON : " + error.message);
                console.error(error);
            }
        }

        // Valider la liste des participants
        function validerParticipants() {
            const input = document.getElementById('participants-input').value.trim();
            const errorMessage = document.getElementById('error-message');
            
            if (!input) {
                errorMessage.textContent = "Veuillez saisir au moins un prénom.";
                errorMessage.style.display = 'block';
                return;
            }
            
            // Séparer les prénoms par virgules ou retours à la ligne
            participants = input.split(/[,\n]/)
                .map(name => name.trim())
                .filter(name => name.length > 0);
            
            if (participants.length === 0 || participants.length > 10) {
                errorMessage.textContent = "Veuillez saisir entre 1 et 10 prénoms.";
                errorMessage.style.display = 'block';
                return;
            }
            
            errorMessage.style.display = 'none';
            document.getElementById('participants-section').classList.add('hidden');
            document.getElementById('draw-section').classList.remove('hidden');
            
            // Charger les données du JSON
            chargerEvaluationData();
        }

        // Tirer au sort une image et un stagiaire
        function tirerAuSort() {
            if (participants.length === 0 || !evaluationData.evaluation_PROTEGER || evaluationData.evaluation_PROTEGER.images.length === 0) {
                alert("Aucune donnée disponible pour le tirage au sort.");
                return;
            }

            // Vérifier si toutes les combinaisons ont été utilisées
            const totalCombinations = participants.length * evaluationData.evaluation_PROTEGER.images.length;
            if (usedCombinations.length >= totalCombinations) {
                alert("Toutes les combinaisons possibles ont été tirées au sort. Réinitialisez pour recommencer.");
                return;
            }

            // Tirer au sort une combinaison unique
            let newCombination;
            do {
                const randomStagiaireIndex = Math.floor(Math.random() * participants.length);
                const randomImageIndex = Math.floor(Math.random() * evaluationData.evaluation_PROTEGER.images.length);
                newCombination = `${randomStagiaireIndex}-${randomImageIndex}`;
            } while (usedCombinations.includes(newCombination));

            usedCombinations.push(newCombination);
            
            const [stagiaireIndex, imageIndex] = newCombination.split('-').map(Number);
            currentStagiaire = participants[stagiaireIndex];
            currentImage = evaluationData.evaluation_PROTEGER.images[imageIndex];

            // Afficher le résultat
            document.getElementById('stagiaire').textContent = `Stagiaire : ${currentStagiaire}`;
            document.getElementById('image-display').src = currentImage.path;
            document.getElementById('description').textContent = currentImage.description;
            document.getElementById('result-container').style.display = 'block';
            
            // Réinitialiser la sélection du type de danger
            document.querySelectorAll('.danger-option').forEach(option => {
                option.classList.remove('selected');
            });
        }

        // Sélectionner un type de danger
        function selectDangerType(element, type) {
            document.querySelectorAll('.danger-option').forEach(option => {
                option.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        // Recommencer un tirage
        function recommencer() {
            document.getElementById('result-container').style.display = 'none';
        }

        // Charger les données au démarrage de la page
        window.onload = function() {
            // Masquer la section de tirage au démarrage
            document.getElementById('draw-section').classList.add('hidden');
        };
    </script>
</body>
</html>
